# MoCE model configuration.
# Maps each "role" (the moderator, plus one per block type) to a HuggingFace
# model id/path and generation settings. Swap `model_id` for any local or
# hub model compatible with AutoModelForCausalLM + a chat template.
#
# Note: models are loaded lazily and cached with an LRU policy bounded by
# `max_loaded_models` below, since a single GPU may not hold every model at once.
# Tuned here for a 4GB-VRAM GPU (e.g. RTX 3050): small models, float16, and
# max_loaded_models=2 so at most two ~0.5-1.5B models are resident at once.
# The moderator uses a slightly larger 1.5B model since plan decomposition
# (correct block types, ids, dependencies) is the hardest task in the
# pipeline and most prone to errors with a 0.5B model. If you have more
# VRAM available, consider bumping other roles too.

max_loaded_models: 2

moderator:
  model_id: Qwen/Qwen2.5-1.5B-Instruct
  device: cuda
  dtype: float16
  generation_kwargs:
    # Plans with several blocks (e.g. "5 languages, each with code + a
    # description" -> 10 blocks) need considerably more headroom than 512
    # tokens, or the JSON gets truncated mid-string and fails to parse.
    max_new_tokens: 1536
    temperature: 0.2
    do_sample: true

text:
  model_id: Qwen/Qwen2.5-1.5B-Instruct
  device: cuda
  dtype: float16
  generation_kwargs:
    max_new_tokens: 512
    temperature: 0.7
    do_sample: true

code:
  # 3B instead of 1.5B: noticeably better instruction-following (less prose
  # leakage into code blocks, fewer malformed-fence responses) and higher
  # code quality, at the cost of needing more VRAM (~6-7GB in float16) than
  # the smaller model. Drop back to Qwen2.5-Coder-1.5B-Instruct if you're
  # constrained to a small (~4GB) GPU.
  model_id: Qwen/Qwen2.5-Coder-3B-Instruct
  device: cuda
  dtype: float16
  generation_kwargs:
    max_new_tokens: 512
    temperature: 0.2
    do_sample: true

structured:
  model_id: Qwen/Qwen2.5-0.5B-Instruct
  device: cuda
  dtype: float16
  generation_kwargs:
    max_new_tokens: 256
    temperature: 0.1
    do_sample: true

image:
  # sd-turbo is a distilled, single-step Stable Diffusion model: fast and
  # low-VRAM (fits comfortably in 4GB), at some quality cost vs. multi-step
  # models. Swap for e.g. "stabilityai/stable-diffusion-xl-base-1.0" if you
  # have more VRAM and want higher quality (and raise num_inference_steps/
  # guidance_scale accordingly, since those are tuned for sd-turbo here).
  model_id: stabilityai/sd-turbo
  kind: diffusion
  device: cuda
  dtype: float16
  generation_kwargs:
    num_inference_steps: 1
    guidance_scale: 0.0
